<div style="padding: 24px">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px">
        <h2>Notas Fiscais</h2>
        <a mat-raised-button color="primary" routerLink="/invoices/new">Nova Nota</a>
    </div>

    <div *ngIf="error" style="color: red; margin-bottom: 12px">{{ error }}</div>

    <table mat-table [dataSource]="invoices" style="width: 100%">
        <ng-container matColumnDef="number">
            <th mat-header-cell *matHeaderCellDef>Número</th>
            <td mat-cell *matCellDef="let inv">{{ inv.number }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef>Status</th>
            <td mat-cell *matCellDef="let inv">{{ inv.status }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Ações</th>
            <td mat-cell *matCellDef="let inv">
                <button mat-raised-button color="accent" [disabled]="inv.status !== 'Aberta' || loading"
                    (click)="print(inv.id)">
                    {{ loading ? 'Imprimindo...' : 'Imprimir' }}
                </button>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
</div>
