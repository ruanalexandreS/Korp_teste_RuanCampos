<div class="page-container">
    <div class="page-header">
        <h1>Produtos</h1>
        <a mat-raised-button color="primary" routerLink="/products/new">+ Novo Produto</a>
    </div>

    <mat-card>
        <mat-card-content>
            <table mat-table [dataSource]="products" style="width: 100%">
                <ng-container matColumnDef="code">
                    <th mat-header-cell *matHeaderCellDef>Código</th>
                    <td mat-cell *matCellDef="let p">{{ p.code }}</td>
                </ng-container>

                <ng-container matColumnDef="description">
                    <th mat-header-cell *matHeaderCellDef>Descrição</th>
                    <td mat-cell *matCellDef="let p">{{ p.description }}</td>
                </ng-container>

                <ng-container matColumnDef="balance">
                    <th mat-header-cell *matHeaderCellDef>Saldo</th>
                    <td mat-cell *matCellDef="let p">
                        <span [style.color]="p.balance <= 0 ? 'red' : 'green'" style="font-weight: 500">
                            {{ p.balance }}
                        </span>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
            </table>

            <p *ngIf="products.length === 0" style="text-align: center; padding: 32px; color: #888">
                Nenhum produto cadastrado.
            </p>
        </mat-card-content>
    </mat-card>
</div>
